name: Integration Tests and Deployment

on:
  push:
    branches:
      - main
      - feature_test_workflow
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development # Staging
          - production

env:
  DEPLOY_ENV: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'development') }}

jobs:
  integration_tests:
    name: Run API Tests and Code Linting
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}
    env:
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linting and Tests
        run: |
          echo "Running API tests in ${{ inputs.environment }} environment..."
          flake8 . --count --show-source --statistics || (echo "Flake8 failed! Fix issues before merging." && exit 1)

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: integration_tests
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: hcmatrixmoved.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag and output
        id: set_tag
        run: |
          IMAGE_TAG=$(date +%Y%m%d%H%M%S)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            hcmatrixmoved.azurecr.io/hcmatrix_app:${{ env.IMAGE_TAG }}
            hcmatrixmoved.azurecr.io/hcmatrix_app:latest
          # V-- FIX IS HERE --V
          cache-from: type=gha
          cache-to: type=gha,mode=max   

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ env.DEPLOY_ENV }}
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Deployment Variables
        id: set_vars
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "RESOURCE_GROUP=HCM-Production" >> $GITHUB_ENV
            echo "CLUSTER_NAME=hcmatrix-aks-moved" >> $GITHUB_ENV
            echo "DEPLOYMENT_TYPE=AKS" >> $GITHUB_ENV
            echo "NAMESPACE=hcmatrix-prod" >> $GITHUB_ENV
            echo "DEPLOYMENT_NAME=hcmatrix-k8s-deployment" >> $GITHUB_ENV
            echo "IMAGE_PULL_NAME=hcmatrixmoved.azurecr.io/hcmatrix_app" >> $GITHUB_ENV
          else # Staging (development)
            echo "RESOURCE_GROUP=HCM-Staging" >> $GITHUB_ENV
            echo "DEPLOYMENT_TYPE=ACI" >> $GITHUB_ENV
            echo "ACI_CONTAINER_NAME=hcmatrix-staging-container" >> $GITHUB_ENV
            echo "IMAGE_PULL_NAME=hcmatrixmoved.azurecr.io/hcmatrix_app" >> $GITHUB_ENV
          fi

      - name: Deploy and Verify AKS (Production Only)
        if: env.DEPLOYMENT_TYPE == 'AKS'
        run: |
          echo "Connecting to AKS cluster..."
          az aks get-credentials --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CLUSTER_NAME }} --overwrite-existing
          
          echo "Applying Kubernetes manifests and Secrets..."
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deployment.yml -n ${{ env.NAMESPACE }}
          kubectl apply -f service.yml -n ${{ env.NAMESPACE }}
          
          kubectl delete secret hcm-secrets -n ${{ env.NAMESPACE }} --ignore-not-found=true
          kubectl create secret generic hcm-secrets -n ${{ env.NAMESPACE }} \
            --from-literal=CLIENT_SECRET='${{ secrets.CLIENT_SECRET }}' \
            --from-literal=KEY_VAULT_NAME='${{ secrets.KEY_VAULT_NAME }}'
            
          echo "Updating deployment image to tag: ${{ env.IMAGE_TAG }}"
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} *=${{ env.IMAGE_PULL_NAME }}:${{ env.IMAGE_TAG }} -n ${{ env.NAMESPACE }}
          
          echo "Waiting for deployment rollout to complete..."
          # We add '|| true' so the workflow continues even if the rollout times out, allowing us to run debug commands.
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --timeout=5m || true

      - name: Debug AKS Deployment (Production Only)
        if: env.DEPLOYMENT_TYPE == 'AKS' && always()
        run: |
          echo " "
          echo "---------------------------------------------------------"
          echo " AKS DEPLOYMENT DEBUGGING INFO"
          echo "---------------------------------------------------------"
          
          echo ">>> Describing deployment status:"
          kubectl describe deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}

          echo " "
          echo ">>> Listing pods and their status:"
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          echo " "
          echo ">>> Describing the events in the namespace (shows ImagePull errors, etc.):"
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp'
          
          echo " "
          echo ">>> Checking logs from the latest pod:"
          # Get the name of the newest pod, even if it's failing
          LATEST_POD=$(kubectl get pods -n ${{ env.NAMESPACE }} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}')
          if [ -n "$LATEST_POD" ]; then
            echo "Logs from pod: $LATEST_POD"
            kubectl logs $LATEST_POD -n ${{ env.NAMESPACE }} --all-containers --tail=100 || echo "Could not retrieve logs for pod $LATEST_POD."
          else
            echo "No pods found to retrieve logs from."
          fi
          echo "---------------------------------------------------------"

      - name: Deploy to ACI (Staging Only)
        if: env.DEPLOYMENT_TYPE == 'ACI'
        run: |
          DNS_NAME="hcmatrix-staging-app-${{ env.IMAGE_TAG }}"
          
          echo "Removing existing container instance if present..."
          az container delete --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.ACI_CONTAINER_NAME }} --yes || true
          
          echo "Waiting for deletion to complete..."
          sleep 30
          
          echo "Creating new container instance with image tag: ${{ env.IMAGE_TAG }}..."
          az container create --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.ACI_CONTAINER_NAME }} \
            --image ${{ env.IMAGE_PULL_NAME }}:${{ env.IMAGE_TAG }} \
            --os-type Linux \
            --registry-login-server hcmatrixmoved.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --dns-name-label $DNS_NAME \
            --ports 5000 \
            --cpu 4 \
            --memory 8 \
            --restart-policy Always \
            --environment-variables DEPLOY_ENV=development \
                                  CLIENT_SECRET='${{ secrets.CLIENT_SECRET }}' \
                                  KEY_VAULT_NAME='${{ secrets.KEY_VAULT_NAME }}'

      - name: Print ACI Logs for Debugging
        if: env.DEPLOYMENT_TYPE == 'ACI' && always()
        run: |
          sleep 20 
          echo "📌 Checking ACI Logs:"
          az container show --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.ACI_CONTAINER_NAME }} --query "{Name:name, State:instanceView.state, IP:ipAddress.ip, FQDN:ipAddress.fqdn, Ports:ipAddress.ports}" -o table

