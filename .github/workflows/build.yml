name: Integration Tests and Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
  pull_request:
    branches:
      - master  # Triggers when a PR is created for master
      - feature/**
    types:
      - closed  # Only triggers when the PR is merged into master

env:
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}

jobs:
  # =======================
  # JOB 1: INTEGRATION TESTS
  # =======================
  integration_tests:
    name: Run API Tests and Code Linting
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: 
      ADLS_CLIENT_SECRET: ${{ secrets.ADLS_CLIENT_SECRET }}
      SPEECH_SERVICE_KEY: ${{ secrets.SPEECH_SERVICE_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_EMBEDDING_API_KEY: ${{ secrets.AZURE_EMBEDDING_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          echo "Running API tests in ${{ inputs.environment }} environment..."
          flake8 **/*.py --count --show-source --statistics || (echo "Flake8 failed! Fix issues before merging." && exit 1)

  # =======================
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # =======================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: integration_tests  # Runs only if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set environment variables
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: az account show

      - name: Log in to Azure Container Registry
        run: az acr login --name hcmatrix

      - name: Build and tag Docker image
        run: |
          docker build -t hcmatrix.azurecr.io/hcmatrix_staging_app:latest .
          docker tag hcmatrix.azurecr.io/hcmatrix_staging_app:latest hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }}

      - name: Push Docker images
        run: |
          docker push hcmatrix.azurecr.io/hcmatrix_staging_app:latest
          docker push hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }}

      - name: Deploy container to Azure Container Instance (ACI)
        run: |
          az container create --resource-group HCM-Staging --name hcmatrix-staging-container --image hcmatrix.azurecr.io/hcmatrix_staging_app:latest --cpu 4 --memory 8 --registry-login-server hcmatrix.azurecr.io --dns-name-label hcmatrix-staging-app --ports 5000 --ip-address Public
