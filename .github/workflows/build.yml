
name: HCM K8S Deployment
on:
  push:
    branches:
      - dev

env:
  REGISTRY:  hcmatrixcontainerregistry.azurecr.io
  IMAGE_NAME: hcmatrix-chatbot

jobs:
  build-and-push:
    name: build and push image
    runs-on: ubuntu-latest
    # This line incase of semantic version when working on private repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v2
        with:
          node-version: "20"
          cache: "yarn"
      
      - name: Install dependencies
        run: |
          yarn install

      - name: Get next version
        run: |
          npx semantic-release --no-ci
          VERSION=$(cat ./artifacts/.VERSION || echo "0.1.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        
      - name: Set uo Docker
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker Build & Push to Azure Container Registry
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: action/checkout@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v1
        with:
          version: 'latest'
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set context to AKS cluster
        run: az aks get-credentials --resource-group hcmatrix-devops --name hcmatrix-k8s

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s-deployment.yml
          kubectl set image deployment/hcmatrix-k8s-deployment hcm-container=$REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Release
        run: |
          npx semantic-release
          cat ./artifacts/.VERSION
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
  