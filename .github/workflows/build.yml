name: Integration Tests and Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
  pull_request:
    branches:
      - master  # Triggers when a PR is created for master
      - feature/**
    types:
      - closed  # Only triggers when the PR is merged into master

env:
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}

jobs:
  # =======================
  # JOB 1: INTEGRATION TESTS
  # =======================
  integration_tests:
    name: Run API Tests and Code Linting
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: 
      ADLS_CLIENT_SECRET: ${{ secrets.ADLS_CLIENT_SECRET }}
      SPEECH_SERVICE_KEY: ${{ secrets.SPEECH_SERVICE_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_EMBEDDING_API_KEY: ${{ secrets.AZURE_EMBEDDING_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          echo "Running API tests in ${{ inputs.environment }} environment..."
          flake8 **/*.py --count --show-source --statistics || (echo "Flake8 failed! Fix issues before merging." && exit 1)

  # =======================
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # =======================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: integration_tests  # Runs only if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set environment variables
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: myregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t myregistry.azurecr.io/my-app:${{ env.IMAGE_TAG }}
          docker push myregistry.azurecr.io/my-app:${{ env.IMAGE_TAG }}

  # =======================
  # JOB 3: DEPLOYMENT TO AKS
  # =======================
  deploy:
    name: Deploy to AKS (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: build-and-push  # Runs only if Docker image was built and pushed successfully
    # if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate with Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Kubernetes Context
        run: |
          az aks get-credentials --resource-group my-aks-group --name my-aks-cluster

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s-deployment.yml
          kubectl set image deployment/my-app my-container=myregistry.azurecr.io/my-app:${{ env.IMAGE_TAG }}

      - name: Verify Deployment
        run: |
          kubectl get pods -n my-namespace
          echo "Deployment to ${{ inputs.environment }} completed successfully!"

