name: Integration Tests and Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
  pull_request:
    branches:
      - master
      - feature/**
    types:
      - closed

env:
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}

jobs:
  integration_tests:
    name: Run API Tests and Code Linting
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          echo "Running API tests in ${{ inputs.environment }} environment..."
          flake8 **/*.py --count --show-source --statistics || (echo "Flake8 failed! Fix issues before merging." && exit 1)

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: integration_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set environment variables
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: az account show

      - name: Log in to Azure Container Registry
        run: az acr login --name hcmatrix

      - name: Build and tag Docker image
        run: |
          docker build -t hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }} .
          docker tag hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }} hcmatrix.azurecr.io/hcmatrix_staging_app:latest

      - name: Push Docker images
        run: |
          docker push hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }}
          docker push hcmatrix.azurecr.io/hcmatrix_staging_app:latest

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Variables
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "RESOURCE_GROUP=HCM-Production" >> $GITHUB_ENV
            echo "CLUSTER_NAME=hcmatrix-prod-cluster" >> $GITHUB_ENV
            echo "DEPLOYMENT_TYPE=AKS" >> $GITHUB_ENV
          else
            echo "RESOURCE_GROUP=HCM-Staging" >> $GITHUB_ENV
            echo "DEPLOYMENT_TYPE=ACI" >> $GITHUB_ENV
          fi

      - name: Deploy to ACI (Staging Only)
        if: env.DEPLOYMENT_TYPE == 'ACI'
        run: |
          az container delete --resource-group $RESOURCE_GROUP --name hcmatrix-staging-container --yes || true
          az container create --resource-group $RESOURCE_GROUP --name hcmatrix-staging-container \
            --image hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }} \
            --cpu 4 --memory 8 \
            --registry-login-server hcmatrix.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --dns-name-label hcmatrix-staging-app --ports 5000 --ip-address Public --os-type Linux \
            --secure-environment-variables CLIENT_SECRET=${{ secrets.CLIENT_SECRET }} KEY_VAULT_NAME=${{ secrets.KEY_VAULT_NAME }}

      - name: Deploy to AKS (Production Only)
        if: env.DEPLOYMENT_TYPE == 'AKS'
        run: |
          az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME
          
          kubectl create namespace hcmatrix-prod --dry-run=client -o yaml | kubectl apply -f -
          
          if kubectl get secret hcm-secrets -n hcmatrix-prod; then
            echo "Secret already exists. Skipping creation..."
          else
            kubectl create secret generic hcm-secrets -n hcmatrix-prod \
              --from-literal=CLIENT_SECRET=${{ secrets.CLIENT_SECRET }} \
              --from-literal=KEY_VAULT_NAME=${{ secrets.KEY_VAULT_NAME }}
          fi
          
          kubectl apply -f deployment.yml -n hcmatrix-prod
          kubectl apply -f service.yml -n hcmatrix-prod

      - name: Scale AKS Cluster (Production Only)
        if: env.DEPLOYMENT_TYPE == 'AKS'
        run: |
          az aks update --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --min-count 4 --max-count 8 --enable-cluster-autoscaler
          
          kubectl rollout status deployment/hcmatrix-k8s-deployment -n hcmatrix-prod

      - name: Print Logs for Debugging
        run: |
          sleep 20  # Wait for pods to start

          if [[ "${{ env.DEPLOYMENT_TYPE }}" == "AKS" ]]; then
              echo "📌 Checking AKS Pods:"
              kubectl get pods -n hcmatrix-prod
          else
              LOGS=$(az container logs --resource-group $RESOURCE_GROUP --name hcmatrix-staging-container || true)
              EVENTS=$(az container show --resource-group $RESOURCE_GROUP --name hcmatrix-staging-container --query instanceView.events || true)

              echo "📌 Container Events:"
              echo "$EVENTS"

              if [[ -z "$LOGS" ]]; then
                  echo "::error title=Container Logs Missing::No logs found. The container might have failed to start."
                  exit 1
              else
                  echo "✅ Container Logs:"
                  echo "$LOGS"
              fi
          fi
        shell: bash
