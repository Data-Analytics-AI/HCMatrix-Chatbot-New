name: Integration Tests and Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
  pull_request:
    branches:
      - master
      - feature/**
    types:
      - closed

env:
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}

jobs:
  integration_tests:
    name: Run API Tests and Code Linting
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          echo "Running API tests in ${{ inputs.environment }} environment..."
          flake8 **/*.py --count --show-source --statistics || (echo "Flake8 failed! Fix issues before merging." && exit 1)

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: integration_tests
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set image tag and output
        id: set_tag
        run: |
          IMAGE_TAG=$(date +%Y%m%d%H%M%S)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: az account show

      - name: Log in to Azure Container Registry
        run: az acr login --name hcmatrix --username ${{ secrets.ACR_USERNAME }} --password ${{ secrets.ACR_PASSWORD }}

      - name: Build and tag Docker image
        run: |
          docker build -t hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }} .
          docker tag hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }} hcmatrix.azurecr.io/hcmatrix_staging_app:latest

      - name: Push Docker images
        run: |
          docker push hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG }}
          docker push hcmatrix.azurecr.io/hcmatrix_staging_app:latest

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment }}
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Deployment Variables
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "RESOURCE_GROUP=HCM-Production" >> $GITHUB_ENV
            echo "CLUSTER_NAME=hcmatrix-aks" >> $GITHUB_ENV
            echo "DEPLOYMENT_TYPE=AKS" >> $GITHUB_ENV
          else
            echo "RESOURCE_GROUP=HCM-Staging" >> $GITHUB_ENV
            echo "DEPLOYMENT_TYPE=ACI" >> $GITHUB_ENV
          fi

      - name: Deploy to AKS (Production Only)
        if: env.DEPLOYMENT_TYPE == 'AKS'
        run: |
          az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME
          kubectl create namespace hcmatrix-prod --dry-run=client -o yaml | kubectl apply -f -
          kubectl delete secret hcm-secrets -n hcmatrix-prod --ignore-not-found=true
          kubectl create secret generic hcm-secrets -n hcmatrix-prod \
            --from-literal=CLIENT_SECRET=${{ secrets.CLIENT_SECRET }} \
            --from-literal=KEY_VAULT_NAME=${{ secrets.KEY_VAULT_NAME }}
          kubectl apply -f deployment.yml -n hcmatrix-prod
          kubectl apply -f service.yml -n hcmatrix-prod

      - name: Scale AKS Cluster (Production Only)
        if: env.DEPLOYMENT_TYPE == 'AKS'
        run: |
          az aks update --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --min-count 4 --max-count 8 --enable-cluster-autoscaler
          kubectl rollout status deployment/hcmatrix-k8s-deployment -n hcmatrix-prod

      - name: Deploy to ACI (Staging Only)
        if: env.DEPLOYMENT_TYPE == 'ACI'
        run: |
          # Create a valid DNS name using a fixed prefix and the image tag
          DNS_NAME="hcmatrix-staging-app-${{ env.IMAGE_TAG }}"
          
          # Ensure DNS name meets requirements (lowercase, starts with letter, etc.)
          if [ -z "${{ env.IMAGE_TAG }}" ]; then
            DNS_NAME="hcmatrix-staging-app-$(date +%Y%m%d%H%M%S)"
          fi
          
          echo "Using DNS name: $DNS_NAME"
          
          az container create --resource-group $RESOURCE_GROUP \
            --name hcmatrix-staging-container \
            --image hcmatrix.azurecr.io/hcmatrix_staging_app:${{ env.IMAGE_TAG || 'latest' }} \
            --os-type Linux \
            --registry-login-server hcmatrix.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --dns-name-label $DNS_NAME \
            --ports 5000 \
            --cpu 1 \
            --memory 1.5 \
            --restart-policy OnFailure \
            --environment-variables DEPLOY_ENV=development

      - name: Print Logs for Debugging
        run: |
          sleep 20  # Wait for pods to start
          echo "📌 Checking Deployment Logs:"
          if [[ "$DEPLOYMENT_TYPE" == "AKS" ]]; then
            kubectl get pods -n hcmatrix-prod
          else
            az container show --resource-group $RESOURCE_GROUP --name hcmatrix-staging-container --query 'instanceView.state'
          fi
        shell: bash