apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcmatrix-k8s-deployment
  # namespace: hcmatrix-prod # Optional: Define namespace here or rely on kubectl -n flag
spec:
#  replicas: 2 # Consider managing replicas via HPA or adjust as needed
  selector:
    matchLabels:
      app: hcmatrix-chatbot
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hcmatrix-chatbot
    spec:
      restartPolicy: Always
      # tolerations: # These tolerations are for running on nodes tainted for critical addons.
      # - key: "CriticalAddonsOnly" # Ensure your new AKS cluster nodes have this taint if you need this toleration.
      #   operator: "Exists" # Or, remove if not needed.
      #   effect: "NoSchedule"
      containers:
        - name: hcm-container
          image: hcmatrixmoved.azurecr.io/hcmatrix_app:latest # MODIFIED: Updated ACR login server and image name
          # The tag 'latest' will be used by default. If you want to pin to a specific IMAGE_TAG from the pipeline,
          # you would typically update this field dynamically in your build.yml (e.g., using sed or kustomize)
          # or use a GitOps approach that updates this file.
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "250m"
              memory: "750Mi"
          livenessProbe:
            httpGet:
              path: / # Ensure this path is a valid health check endpoint in your app
              port: 5000
            initialDelaySeconds: 15 # Increased slightly
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: / # Ensure this path is a valid health check endpoint in your app
              port: 5000
            initialDelaySeconds: 10 # Increased slightly
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hcm-secrets
                  key: CLIENT_SECRET
            - name: KEY_VAULT_NAME
              valueFrom:
                secretKeyRef:
                  name: hcm-secrets
                  key: KEY_VAULT_NAME
            # Add any other environment variables your application needs
            - name: DEPLOY_ENV # Example: if your app needs to know the environment
              value: "production" # This is static here; could be set from ConfigMap or Downward API if needed dynamically per pod
      imagePullSecrets:
        - name: acr-secret # MODIFIED: Ensure this secret exists in the 'hcmatrix-prod' namespace and is configured for 'hcmatrixmoved.azurecr.io'