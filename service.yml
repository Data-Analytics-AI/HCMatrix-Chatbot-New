apiVersion: v1
kind: Service
metadata:
  name: hcmatrix-k8s-service
  # namespace: hcmatrix-prod # Optional: Define namespace here or rely on kubectl -n flag
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health" # MODIFIED: Changed to /health. Ensure this matches an actual health endpoint in your app
spec:
  selector:
    app: hcmatrix-chatbot # This must match the labels in your deployment.yml template
  ports:
    - protocol: TCP
      port: 5000      # External port the LoadBalancer will listen on
      targetPort: 5000  # Port on your pods (containerPort)
  type: LoadBalancer
  externalTrafficPolicy: Local # This is good for preserving client source IP.